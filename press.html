    <style>
      @font-face {
        font-family: "Varela Round";
        src:
          url("VarelaRound-Regular.woff2") format("woff2"),
          url("VarelaRound-Regular.woff") format("woff");
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      /* Reset & Base */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        background: #fff;
        max-width: 100vw;
        overflow: hidden;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        scroll-behavior: smooth;
        max-width: 100vw;
        overflow: hidden;
      }

      body {
        font-family: "Varela Round", sans-serif;
        color: #000;
      }

      /* Fixed Side Nav */
      .multi-color-line {
        width: 100%;
        height: 6px;
        background: linear-gradient(90deg, #ff5f6d, #ffc371, #4caf50, #2196f3);
        margin: 10px 0;
      }

      /* Horizontal Colored Lines */

      .horizontal-lines {
        background-color: #fff;
      }

      .horizontal-line {
        width: 100%;
        height: 3px;
        margin-top: 6px;
      }

      .horizontal-line:first-child {
        margin-top: -5px;
      }

      .horizontal-line:last-child {
        margin-bottom: 15px;
      }

      /* Vertical Colored Lines */
      .vertical-lines {
        position: absolute;
        top: 0;
        left: -1px;
        height: 100vh;
        display: flex;
        flex-direction: row;
        gap: 6px;
      }

      .vertical-line {
        width: 3px;
        height: 100%;
      }

      .image-frame {
        border: 3px solid;
        border-color: transparent;
        border-right: 0;
        border-radius: 180px 0 0 180px;
      }

      .image-frame1 {
        padding: 3px;
        padding-right: 0;
      }

      .image-frame1,
      .image-frame2,
      .image-frame3,
      .image-frame4,
      .image-frame5 {
        border: 3px solid;
        border-color: transparent;
        border-right: 0;
        border-radius: 180px 0 0 180px;
        padding: 6px;
        padding-right: 0;
      }

      /* ─── RED ─────────────────────────────────────────────────────────── */
      .ImageBorder1Red .image-frame1,
      .ImageBorder2Red .image-frame2,
      .ImageBorder3Red .image-frame3,
      .ImageBorder4Red .image-frame4,
      .ImageBorder5Red .image-frame5 {
        border-color: #ec7063;
      }

      /* ─── YELLOW ─────────────────────────────────────────────────────── */
      .ImageBorder1Yellow .image-frame1,
      .ImageBorder2Yellow .image-frame2,
      .ImageBorder3Yellow .image-frame3,
      .ImageBorder4Yellow .image-frame4,
      .ImageBorder5Yellow .image-frame5 {
        border-color: #f7b500;
      }

      /* ─── BLUE ───────────────────────────────────────────────────────── */
      .ImageBorder1Blue .image-frame1,
      .ImageBorder2Blue .image-frame2,
      .ImageBorder3Blue .image-frame3,
      .ImageBorder4Blue .image-frame4,
      .ImageBorder5Blue .image-frame5 {
        border-color: #5dade2;
      }

      /* ─── GREEN ──────────────────────────────────────────────────────── */
      .ImageBorder1Green .image-frame1,
      .ImageBorder2Green .image-frame2,
      .ImageBorder3Green .image-frame3,
      .ImageBorder4Green .image-frame4,
      .ImageBorder5Green .image-frame5 {
        border-color: #48c9b0;
      }

      /* ─── GRAY ────────────────────────────────────────────────────────── */
      .ImageBorder1Gray .image-frame1,
      .ImageBorder2Gray .image-frame2,
      .ImageBorder3Gray .image-frame3,
      .ImageBorder4Gray .image-frame4,
      .ImageBorder5Gray .image-frame5 {
        border-color: #848484;
      }

      /* ─── Clear ────────────────────────────────────────────────────────── */
      .ImageBorder1Clear .image-frame1,
      .ImageBorder2Clear .image-frame2,
      .ImageBorder3Clear .image-frame3,
      .ImageBorder4Clear .image-frame4,
      .ImageBorder5Clear .image-frame5 {
        border: none;
        padding: 0;
        margin: 0;
      }

      .line-1 {
        background-color: #ec7063;
      }

      .line-2 {
        background-color: #f7b500;
      }

      .line-3 {
        background-color: #5dade2;
      }

      .line-4 {
        background-color: #48c9b0;
      }

      .side-nav {
        position: fixed;
        top: 0;
        right: 0;
        height: 100vh;
        background: #fff;
        border-left: 1px solid #ddd;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0px 20px;
        padding-left: 46px;
        /* Adjusted to accommodate vertical lines */
        z-index: 100;
      }

      .side-nav .logo {
        width: 100%;
        max-width: 325px;
        margin-bottom: 0px;
      }

      .nav-list {
        list-style: none;
        width: 100%;
        padding: 0;
      }

      .nav-list li {
        margin: 0;
      }

      .nav-list a,
      .side-buttons a {
        display: block;
        text-align: center;
        font-weight: bold;
        font-size: 1.5rem;
        text-decoration: none;
      }

      .nav-list a {
        text-decoration: none;
        color: #898989;
        transition: color 0.3s;
        padding-top: 6px;
        padding-bottom: 6px;
        border: 3px solid transparent;
        margin: 0 6px;
      }

      .nav-list a {
        border: 3px solid transparent;
        border-radius: 30px;
        width: auto;
        transition:
          color 0.2s,
          border-color 0.2s;
      }

      /* 2) Per-section custom property */
      .nav-list a.challenge {
        --active-color: #f7b500;
      }

      .nav-list a.vision {
        --active-color: #5dade2;
      }

      .nav-list a.why {
        --active-color: #ec7063;
      }

      .nav-list a.how {
        --active-color: #48c9b0;
      }

      .nav-list a.future {
        --active-color: #888;
      }

      /* 3) Single rule for both hover & active states */
      .nav-list a:hover,
      .nav-list a.active {
        color: var(--active-color);
        border-color: var(--active-color);
      }

      .side-buttons {
        margin-top: auto;
        width: 100%;
      }

      .btn {
        width: auto;
        margin: 8px;
        padding: 12px 0;
        border-radius: 30px;
        border: 3px solid transparent;
      }

      .btn {
        transition:
          background-color 0.25s ease,
          color 0.25s ease,
          box-shadow 0.2s ease,
          transform 0.1s ease;
      }

      .btn.primary {
        background: #7faedb;
        color: #fff;
      }

      .btn.secondary {
        background: #7ebba2;
        color: #fff;
      }

      .btn.tertiary {
        background: #ec7063;
        color: #fff;
        text-decoration: none;
        text-align: center;
      }

      .btn.primary:hover {
        background: #7faedb;
        /* a touch darker */
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.25);
        transform: translateY(-2px);
      }

      .btn.secondary:hover {
        background: #7ebba2;
        /* darker variant of #7ebba2 */
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.25);
        transform: translateY(-2px);
      }

      .btn.tertiary:hover {
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.25);
        transform: translateY(-2px);
      }

      .btn.primary.active {
        background: #ffffff;
        /* even darker for primary */
        color: #7faedb;
        border-color: #7faedb;
      }

      .btn.secondary.active {
        background: white;
        /* darker for secondary */
        color: #7ebba2;
        border-color: #7ebba2;
      }

      .btn.tertiary.active {
        background: white;
        /* darker for secondary */
        color: #ec7063;
        border-color: #ec7063;
      }

      /*
              .btn.primary:hover {
                  background-color: transparent;
                  color: #7FAEDB;
                  border-color: #7FAEDB;
              }

              .btn.primary.active {
                  background-color: transparent;
                  color: #7FAEDB;
                  border-color: #7FAEDB;
                  font-weight: bold;
              }

              .btn.secondary.active {
                  background-color: transparent;
                  color: #7ebba2;
                  border-color: #7ebba2;
                  font-weight: bold;
              }
                  */

      /* Slides Container */
      .slides {
        position: absolute;
        top: 0;
        left: 0;
        height: 100vh;
        overflow-y: auto;
        /*scroll-snap-type: y mandatory;*/
        overscroll-behavior: contain;
        overflow-x: hidden;
      }

      .slides::-webkit-scrollbar {
        display: none;
      }

      /* Slide Base */
      .slide {
        /*scroll-snap-align: start;*/
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 120px 0 120px 40px;
        position: relative;
      }

      .slide.home {
        align-items: center;
        padding: 0 40px;
      }

      .slide.challenge {
        background: #f7b500;
      }

      .slide.vision {
        background: #5dade2;
      }

      .slide.why {
        background: #ec7063;
      }

      .slide.how {
        background: #48c9b0;
      }

      .slide.future {
        background: #888;
      }

      .slide.supportTheCause {
        background: #7ebba2;
      }

      .slide.joinTheMovement {
        background: #7faedb;
      }

      .slide.press-text {
        background-color: #fff;
      }

      /* Section Title Outline */
      .section-title {
        font-size: 4rem;
        padding-right: 10px;
        /* Dynamically adjusts font size */
        text-transform: uppercase;
        color: transparent;
        -webkit-text-stroke: 2px #000;
        letter-spacing: 4px;
        margin-bottom: 2rem;
        margin-top: calc(-6vh);
        display: block;
      }

      .supportTheCause .section-title,
      .joinTheMovement .section-title {
        text-align: center;
        width: 100%;
      }

      /* Text Block */
      .text-block {
        flex: 1;
        padding-right: 80px;
        display: flex;
        flex-direction: column;
        max-width: 50%;
        /* Dynamically adjusts font size */
      }

      .text-block p {
        font-size: 1.6rem;
        line-height: 1.6;
        margin-bottom: 1.8rem;
      }

      .press-header {
        position: sticky;
        top: 0;
        z-index: 100;
        transition:
          padding 0.3s ease,
          box-shadow 0.3s ease;
        background-color: #f7b500;
        color: #fff;
        padding: 0.75rem 1.5rem;
        text-align: center;
      }

      .press {
        font-family: "Montserrat", sans-serif;
        line-height: 1.6;
        margin: auto;
        color: #333;
      }

      .press-bar {
        display: flex;
        gap: 20px;
        align-items: center;
        border: 3px solid;
        border-radius: 35px;
        margin: 1rem;
        padding: 0.5rem;
        color: #888;
        text-decoration: none;
      }

      /* alternate press bar border colors */
      .press-bar:nth-child(4n) {
        border-color: #f5b400;
        background-color: rgb(247, 181, 0, 25%);
      }
      .press-bar:nth-child(4n + 1) {
        border-color: #5dade2;
        background-color: rgb(93, 173, 226, 25%);
      }

      .press-bar:nth-child(4n + 2) {
        border-color: #ec7063;
        background-color: rgb(236, 112, 99, 25%);
      }

      .press-bar:nth-child(4n + 3) {
        border-color: #48c9b0;
        background-color: rgb(72, 201, 176, 25%);
      }

      .press-bar:hover {
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.25);
        transform: translateY(-2px);
      }

      .press-icon {
        width: 200px;
        margin: 1rem;
      }

      .press-text {
        padding: 2rem;
      }


      .press-text p {
        margin-bottom: 1.25rem;
      }

      .press-text ul {
        margin-bottom: 1.5rem;
        padding-left: 2.5rem;
      }

      .press-text li {
        margin-bottom: 0.5rem;
      }

      /* Shrunk state */
      /* .press-header.is-shrunk {
      padding: 0.75rem 1.5rem;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    } */

      .text-right {
        text-align: end;
      }

      .text-center {
        text-align: center;
      }

      .text-italic {
        font-style: italic;
      }

      .text-bold {
        font-weight: bold;
      }

      /* Image Column */
      .image-column {
        display: flex;
        flex-direction: column;
        gap: 30px;
        align-items: flex-end;
        flex: 1;
        max-width: 40%;
      }

      .image-frame img {
        width: 100%;
        display: block;
        border-radius: 180px 0 0 180px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        border-right: 0;
      }

      .image-frame.echo img {
        opacity: 0.5;
      }

      /* Home Slide Center Text */
      .center-text {
        flex: 1;
        text-align: center;
      }

      .center-text h1 {
        font-size: 5rem;
        line-height: 1.1;
        color: #fff;
      }

      .frameSlide {
        display: block;
        margin: 0;
        padding: 60px 0;
        padding-top: 120px;
      }

      .frameSlide .text-block {
        padding-left: 40px;
        padding-right: 40px;
        display: block;
      }

      .frameSlide iframe {
        width: 100%;
        min-height: 68vh;
      }

      #joinTheMovement iframe {
        min-height: 80vh;
      }

      .navAndButtons {
        width: 100%;
      }

      #home {
        position: relative;
      }

      #home img {
        position: fixed;
        left: 0;
        top: 0;
        z-index: -1;
        width: 70%;
      }

      .slide.reverse-columns {
        transform: scale(-1, 1);
      }

      .slide.reverse-columns .text-block h2,
      .slide.reverse-columns .text-block p {
        transform: scale(-1, 1);
      }

      .mobileNavButton {
        display: none;
      }

      .footer {
        position: fixed;
        bottom: 0;
        text-align: center;
        color: white;
        font-weight: bold;
        /* background: rgba(80, 147, 213, 0.321); */
        background: #7faedb;
        left: 0;
        padding-bottom: 5px;
        padding-top: 5px;
        padding: 10px;
        text-align: center;
        text-indent: 10px;
        font-size: 14px;
      }

      #future .text-block {
        max-width: 60%;
      }

      #future .text-block p {
        font-size: 1.9em;
      }

      #joinTheMovement .text-block p {
        text-align: center;
      }

      .frameSlide .text-block {
        max-width: 100%;
      }

      .homeTextArea {
        position: absolute;
        top: 60%;
        /* 50% down from the top of the slide */
        right: 5%;
        /* 10% in from the right edge */
        transform: translateY(-50%);
        max-width: 45%;
        /* so it doesn’t span the whole width */
        text-align: left;
        /* left align your lines */
        color: #fff;
        /* or whatever text color you need */
        /* padding, font-size, line-height, etc. as needed: */
        padding: 1rem;
      }

      /* style your headings */
      .homeTextArea p {
        font-size: 3rem;
        /* scale with viewport width */
        line-height: 1.1;
        margin: 0;
      }

      .text-block ul {
        margin-left: 80px;
      }

      .text-block ul li {
        list-style-type: disc;
        margin-bottom: 20px;
      }

      /* Media Queries */

      .text-block ul li {
        font-size: 1.4rem;
      }

      .nonMobile {
        display: none;
      }

      .mobileLogo {
        height: 90px;
        padding-right: 12px;
      }

      .mobileOnly {
        display: block;
      }

      @media (min-width: 1000px) {
        .mobileOnly {
          display: none;
        }

        .nonMobile {
          display: block;
        }

        #how .text-block p,
        #vision .text-block p,
        #challenge .text-block p {
          font-size: 1.8rem;
        }

        .homeTextArea {
          max-width: 90%;
          padding: 40px;
          background: rgba(116, 153, 196, 0.89);
          border-radius: 20px;
        }

        .homeTextArea p {
          font-size: 3rem;
        }
      }

      @media (min-width: 1201px) {
        .homeTextArea {
          max-width: 70%;
        }

        #how ul li,
        #how .text-block p,
        #vision .text-block p,
        #challenge .text-block p,
        #why .text-block p {
          font-size: 2rem;
        }
      }

      @media (min-width: 1701px) {
        .homeTextArea {
          max-width: 63%;
        }

        .homeTextArea p {
          font-size: 4rem;
        }

        .section-title {
          font-size: 4 rem;
        }

        .side-nav {
          width: 30%;
        }

        .side-nav li a,
        .side-buttons a {
          font-size: 2rem;
        }

        .slides,
        .footer {
          width: calc(100% - 30%);
        }

        .image-frame1,
        .image-frame2,
        .image-frame3,
        .image-frame4,
        .image-frame5,
        .image-frame img {
          border-radius: 200px 0 0 200px;
        }

        .image-frame1,
        .image-frame {
          padding: 0;
          border: none;
        }
      }

      @media (min-width: 1900px) {
        #vision .text-block p {
          font-size: 2.2rem;
        }

        #supportTheCause .text-block p {
          font-size: 1.9rem;
        }

        .text-block ul li {
          font-size: 2.2rem;
        }

        .section-title {
          font-size: 6rem;
        }

        .text-block {
          padding: 0;
        }

        .text-block p {
          font-size: 2.2rem;
        }

        #challenge .text-block p {
          font-size: 2.5rem;
        }

        #why .text-block p {
          font-size: 2.2rem;
        }
      }

      @media (min-width: 2200px) {
        .image-frame1,
        .image-frame2,
        .image-frame3,
        .image-frame4,
        .image-frame5,
        .image-frame img {
          border-radius: 260px 0 0 260px;
        }

        .section-title {
          font-size: 6.5rem;
        }
      }

      @media (max-width: 1700px) {
        .side-nav {
          width: 27%;
        }

        .side-nav li a {
          font-size: 2.3rem;
        }

        .slides,
        .footer {
          width: calc(100% - 27%);
        }
      }

      @media (max-width: 1399px) {
        .side-nav {
          width: 25%;
        }

        .slides,
        .footer {
          width: calc(100% - 25%);
        }

        .side-nav li a,
        .side-buttons a {
          font-size: 1.7rem;
        }

        .text-block {
          max-width: 60%;
          padding-right: 40px;
        }
      }

      @media (max-width: 1180px) {
        .side-nav {
          width: 25%;
        }

        .slides,
        .footer {
          width: calc(100% - 25%);
        }

        .side-nav li a,
        .side-buttons a {
          font-size: 1.3rem;
        }
      }

      @media (min-width: 1000px) {
        .navAndButtons {
          /* override any inline max-height from mobile */
          max-height: none !important;
          overflow: visible !important;
        }
      }

      @media (min-height: 900px) {
        .nav-list {
          margin-bottom: 5vh;
        }
      }

      @media (max-height: 799px) {
        .side-nav li a,
        .side-buttons a {
          font-size: 1.6rem;
          line-height: 1.9rem;
        }

        .nav-list {
          margin-bottom: 2vh;
        }

        #future .text-block {
          max-width: 60%;
          padding-right: 0;
        }

        #future .text-block p {
          font-size: 1.4rem;
        }
      }

      @media (max-height: 700px) {
        .side-nav {
          width: 20%;
        }

        .side-nav .logo {
          width: 150px;
        }

        .side-nav li a {
          font-size: 1.2rem;
          line-height: 1.2rem;
        }

        .side-buttons a {
          font-size: 1.2rem;
          line-height: 1.2rem;
        }
      }

      @media (max-width: 999px) {
        .mobileNavTopShadowWrap a {
          float: right;
        }

        #future .text-block {
          max-width: 100%;
        }

        .side-buttons.btn {
          margin: auto 1rem;
        }

        .text-block ul {
          margin-left: 80px;
        }

        .text-block ul li {
          text-align: left;
        }
      }

      @media (min-width: 1000px) and (max-height: 900px) {
        .text-block,
        #future .text-block {
          padding-right: 20px;
        }

        .slide {
          padding-top: 60px;
          padding-bottom: 60px;
        }
      }

      * .text-block {
        max-width: none;
        padding-right: 14px;
      }

      #vision .text-block {
        padding-right: 40px;
      }

      @media (max-width: 999px) {
        .slides {
          scroll-snap-type: none;
        }

        .section-title {
          font-size: 2rem;
          padding-left: 0;
          padding-right: 0;
        }

        .mobileNavButton {
          display: block;
        }

        #home img {
          position: inherit;
          width: 200%;
          margin-left: 100%;
          margin-bottom: -40%;
        }

        .side-nav {
          width: 100%;
          height: auto;
          position: fixed;
          top: 0;
          left: 0;
          flex-direction: row;
          align-items: center;
          padding: 0;
          border-left: none;
          border-bottom: 1px solid #ddd;
          z-index: 200;
          display: block;
        }

        .vertical-lines {
          display: none;
        }

        .side-nav .logo {
          max-width: 90px;
        }

        .navAndButtons {
          display: block;
          overflow: hidden;
          max-height: 0;
          /* start fully closed */
          transition: max-height 300ms ease;
        }

        .nav-list {
          display: block;
        }

        .side-buttons {
          padding-bottom: 15px;
        }

        .slides {
          position: absolute;
          top: 90px;
          /* height of your fixed .side-nav */
          bottom: 0;
          /* fill down to the bottom edge */
          left: 0;
          width: 100%;
          height: auto;

          overflow-y: auto;
          /*scroll-snap-type: y mandatory;*/
          overscroll-behavior: contain;
          overflow-x: hidden;
        }

        .slide {
          flex-direction: column !important;
          padding: 80px 20px;
          justify-content: flex-start;
          height: auto;
          min-height: auto;
          padding: 1rem;
          padding-bottom: 1vh;
        }

        .text-block ul {
          margin-left: 50px;
        }

        .text-block ul li {
          list-style-type: square;
          margin-bottom: 0.5rem;
          font-size: 1rem;
        }

        #vision .text-block {
          padding: 0;
        }

        .text-block,
        .image-column {
          max-width: 100%;
          padding: 0;
          flex: none;
        }

        .text-block {
          order: 2;
          text-align: center;
        }

        .image-column {
          order: 1;
          flex-direction: row;
          gap: 10px;
          overflow-x: auto;
          justify-content: center;
          margin-top: 1rem;
        }

        .image-column .image-frame {
          height: 46vw;
          overflow: hidden;
        }

        .image-column .image-frame img {
          margin-top: -12px;
        }

        #challenge .image-frame img {
          margin-top: -60px;
        }

        #how .image-frame img,
        #why .image-frame img,
        #future .image-frame img {
          margin-top: 0;
        }

        .homeTextArea {
          left: 0%;
          max-width: 100%;
          transform: none;
          position: initial;
          background: rgba(116, 153, 196, 0.95);
          border-radius: 0px;
          padding: 20px;
          margin-top: -80px;
        }

        #home {
          padding: 0;
          padding-bottom: 0;
          margin-bottom: 0;
        }

        #home img {
          top: -60px;
        }

        .slide img {
          padding-bottom: 3vw;
        }

        .section-title {
          margin: 0;
          padding-top: 17px;
          padding-bottom: 7px;
          font-size: 1.4rem;
        }

        #supportTheCause .section-title,
        #joinTheMovement .section-title {
          font-size: 1.4rem;
          padding: 10px;
          padding-top: 20px;
        }

        .image-column {
          margin: 0;
        }

        .image-column * {
          border: none;
          margin: 0;
          padding: 0;
          border-radius: 0;
        }

        .image-column .individualImage:nth-child(2) {
          display: none;
        }

        .image-column .image-frame img {
          border-radius: 0;
          width: 100%;
          height: auto;
        }

        .text-block p {
          margin-bottom: 13px;
          padding-left: 13px;
          padding-right: 13px;
          text-align: left;
        }

        .press-header {
          text-align: center;
        }

        .mobileNavButton {
          cursor: pointer;
          display: block;
          float: left;
        }

        .mobileNavButton svg {
          transition: transform 500ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mobileNavButton.active svg {
          transform: rotate(90deg);
        }

        .mobileNavButton path {
          transition:
            transform 500ms cubic-bezier(0.4, 0, 0.2, 1),
            stroke-dasharray 500ms cubic-bezier(0.4, 0, 0.2, 1),
            stroke-dashoffset 500ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mobileNavButton path:nth-child(1) {
          transform-origin: 36% 40%;
        }

        .mobileNavButton path:nth-child(2) {
          stroke-dasharray: 29 299;
        }

        .mobileNavButton path:nth-child(3) {
          transform-origin: 35% 63%;
        }

        .mobileNavButton path:nth-child(4) {
          stroke-dasharray: 29 299;
        }

        .mobileNavButton path:nth-child(5) {
          transform-origin: 61% 52%;
        }

        .mobileNavButton path:nth-child(6) {
          transform-origin: 62% 52%;
        }

        .mobileNavButton.active path:nth-child(1) {
          transform: translateX(9px) translateY(1px) rotate(45deg);
        }

        .mobileNavButton.active path:nth-child(2) {
          stroke-dasharray: 225 299;
          stroke-dashoffset: -72px;
        }

        .mobileNavButton.active path:nth-child(3) {
          transform: translateX(9px) translateY(1px) rotate(-45deg);
        }

        .mobileNavButton.active path:nth-child(4) {
          stroke-dasharray: 225 299;
          stroke-dashoffset: -72px;
        }

        .mobileNavButton.active path:nth-child(5) {
          transform: translateX(9px) translateY(1px) rotate(-45deg);
        }

        .mobileNavButton.active path:nth-child(6) {
          transform: translateX(9px) translateY(1px) rotate(45deg);
        }

        .frameSlide .text-block {
          padding: 0;
        }

        .image-frame,
        .image-column,
        .image-frame img {
          width: 100%;
        }

        .individualImage {
          width: 100%;
        }

        .footer {
          text-indent: 0;
          text-align: center;
          position: inherit;
          width: 100%;
        }

        .text-block p,
        #future .text-block p {
          font-size: 1.6rem;
        }

        .homeTextArea p {
          font-size: 1.6rem;
          line-height: 2.4rem;
        }

        .hideOnMobile {
          display: none;
        }
      }

      @media (max-width: 767px) {
        .text-block p,
        #future .text-block p {
          font-size: 1.2rem;
        }
        .press-icon {
          width: 100px;
        }

        .press-bar h2 {
          font-size: 1rem;
          margin-bottom: 0;
        }
      }
    </style>
  </head>

  <body>
    <aside class="side-nav">
      <div class="vertical-lines">
        <div class="vertical-line line-1"></div>
        <div class="vertical-line line-2"></div>
        <div class="vertical-line line-3"></div>
        <div class="vertical-line line-4"></div>
      </div>
      <div class="mobileNavTopShadowWrap">
        <a href="./"
          ><img
            class="mobileLogo mobileOnly"
            src="apwmobile.jpg"
            alt="APW logo" /><img
            class="logo nonMobile"
            src="apw.png"
            alt="APW logo"
        /></a>

        <div class="mobileNavButton" onclick="toggleNavList()">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="90"
            height="90"
            viewBox="0 0 200 200"
          >
            <g stroke-width="6.5" stroke-linecap="round">
              <path

              <path

      </div>
      <div class="navAndButtons">
        <ul class="nav-list">
          <li style="display: none">

          <li>
            <a href="./#challenge" data-idx="1" class="challenge"
              >The CHALLENGE</a

          </li>
          <li>
            <a href="./#vision" data-idx="2" class="vision">The VISION</a>
          </li>
          <li>
            <a href="./#why" data-idx="3" class="why">The WHY</a>
          </li>
          <li>

          </li>
          <li>
            <a href="./#future" data-idx="5" class="future">The FUTURE</a>
          </li>

        <div class="side-buttons">
          <a class="btn tertiary" data-idx="6" href="./#getInvolved"
            >Get INVOLVED</a

            >SUPPORT the Cause</a

          <a class="btn primary" data-idx="8" href="./#joinTheMovement"

        <div class="horizontal-lines mobileOnly">

    <main class="slides">
      <!-- Slide 1 (Press Releases) -->
      <section id="press-release" class="press">
        <div class="">
          <h1 class="press-header">PRESS</h1>
        </div>
        
        <!-- dynamically generate press bars -->
        <div id="press-content"></div>

        <!-- footer -->

        <div class="footer hideOnMobile">
          &#169; <span class="year"></span>
          ALL PARENTS WELCOME :: a 501(c)(3) nonprofit (EIN: 33-2926041) :: All
          Rights Reserved
        </div>
        <div class="footer mobileOnly">
          &#169; <span class="year"></span> ALL PARENTS WELCOME<br />:: a
          501(c)(3) nonprofit (EIN: 33-2926041) ::
        </div>
      </footer>
    </main>

    <script>
      function toggleNavList() {
        const btn = document.querySelector(".mobileNavButton");
        const nav = document.querySelector(".navAndButtons");

        // toggle the arrow/burger rotation
        btn.classList.toggle("active");

        // if already open, close it
        if (nav.classList.contains("open")) {
          nav.style.minHeight = "0";
          nav.style.maxHeight = "0";
          nav.classList.remove("open");
        } else {
          console.log("no open");
          // measure full height, apply it, then mark open
          const fullHeight = nav.scrollHeight + "px";
          nav.style.maxHeight = fullHeight;
          //nav.style.minHeight = '100vh';
          nav.classList.add("open");
        }
      }

      // dynamically generate press bars
      let pressRelease = [
        {
          icon: "./Forbes_logo_PNG1.png",
          alt: "Forbes logo",
          link: "https://www.forbes.com/sites/afdhelaziz/2026/01/26/how-the-dilf-handbook-debunks-the-biggest-myths-of-fatherhood/",
          title: "FORBES: How The DILF Handbook Debunks The Biggest Myths Of Fatherhood",
          target: "_blank"
        },
        {
          icon: "./DSD.png",
          alt: "Dads supporting dads logo",
          link: "https://allparentswelcome.org/book-release.html",
          title: "Press Release: Nonprofit “All Parents Welcome” Launches New Publishing Imprint With Its Debut Release Helping Dads and Moms Build Stronger Homes Together",
          target: ""
        },
        {
          icon: "./NPR_logo_PNG1.png",
          alt: "NPR logo",
          link: "https://the1a.org/segments/in-good-company-the-problem-of-isolation-for-parents/",
          title: "NPR: In Good Company: The problem of isolation for parents",
          target: "_blank"
        },
        {
          icon: "./apw.png",
          alt: "All Parents Welcome logo",
          link: "https://allparentswelcome.org/press-release-1.html",
          title: "Press Release: Nonprofit “All Parents Welcome” Launches with a Mission to Disrupt Parenting Culture and Champion Inclusive Parental Support",
          target: ""
        },
      ];

      document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("press-content");

        pressRelease.forEach((release) => {
          const pressBarContainer = document.createElement("a");
          pressBarContainer.classList.add("press-bar");
          pressBarContainer.target = release.target;
          pressBarContainer.href = release.link;

          const icon = document.createElement("img");
          icon.src = release.icon;
          icon.alt = release.alt;
          icon.classList.add("press-icon");

          const title = document.createElement("h2");
          title.id = release.index;
          title.textContent = release.title;

          pressBarContainer.appendChild(icon);
          pressBarContainer.appendChild(title);

          container.appendChild(pressBarContainer);
        });
        // automatically update year
        document.querySelectorAll(".year").forEach((el) => {
          el.textContent = new Date().getFullYear();
        });
      });
    </script>
